  const [postPrimary, setPostPrimary] = useState(null);
  const [checkedIds,  setCheckedIds]  = useState(new Set());
  const [spherePicks, setSpherePicks] = useState({});
  const [revealed,    setRevealed]    = useState(false);
  const [highlights,  setHighlights]  = useState({});

  // ★ 회복 카드 관련 state
  const [isPerfect,     setIsPerfect]     = useState(false);
  const [healPhase,     setHealPhase]     = useState(false);
  const [healedSphere,  setHealedSphere]  = useState(null);

  const logsRef=useRef(null);
  useEffect(()=>{logsRef.current?.scrollTo(0,logsRef.current.scrollHeight);},[logs]);

  const addLog=(msg,t)=>setLogs(p=>[...p,`[${t||turn}턴] ${msg}`]);

  function startGame(){
    setStats(INIT);setPrevStats(INIT);setTurn(1);
    setHand(drawHand(3));setLogs([]);setResult(null);setScore(0);
    setActiveCard(null);setPostPrimary(null);
    setCheckedIds(new Set());setSpherePicks({});setRevealed(false);setHighlights({});
    setIsPerfect(false);setHealPhase(false);setHealedSphere(null);
    setScreen('select');
  }

  function pickCard(card){
    const after={...stats};
    after[card.primary.key]=clamp(after[card.primary.key]+card.primary.delta);
    setPrevStats(stats);setPostPrimary(after);setActiveCard(card);
    setCheckedIds(new Set());setSpherePicks({});setRevealed(false);setHighlights({});
    setIsPerfect(false);setHealPhase(false);setHealedSphere(null);
    addLog(`선택: "${card.name}"`,turn);
    setScreen('consequences');
  }

  function toggleCheck(id){
    setCheckedIds(prev=>{
      const next=new Set(prev);
      if(next.has(id)){next.delete(id);setSpherePicks(sp=>{const n={...sp};delete n[id];return n;});}
      else next.add(id);
      return next;
    });
  }

  function pickSphere(cid,sk){setSpherePicks(p=>({...p,[cid]:sk}));}

  const totalCorrect = activeCard ? correctCount(activeCard) : 0;
  const checkedCorrect = activeCard ? activeCard.consequences.filter(c=>c.correct&&checkedIds.has(c.id)).length : 0;
  const checkedWrong   = activeCard ? activeCard.consequences.filter(c=>!c.correct&&checkedIds.has(c.id)).length : 0;
  const allCorrectChecked = checkedCorrect === totalCorrect;
  const allSpheresPicked  = checkedIds.size>0 && [...checkedIds].every(id=>spherePicks[id]);
  const canConfirm = allCorrectChecked && allSpheresPicked;

  function confirm(){
    if(!canConfirm) return;
    setRevealed(true);
    let ns={...postPrimary};const hl={};
    let pts=2;
    let sphereCorrectCount=0;
    activeCard.consequences.forEach(c=>{
      const yes=checkedIds.has(c.id);const sp=spherePicks[c.id]||null;
      if(yes&&c.correct){pts+=3;if(c.delta!==0){ns[c.key]=clamp(ns[c.key]+c.delta);hl[c.key]=c.delta>0?'good':'bad';}if(sp===c.key){pts+=3;sphereCorrectCount++;}}
      else if(yes&&!c.correct)pts-=2;
    });
    pts=Math.max(0,pts);

    const perfect = checkedCorrect===totalCorrect && checkedWrong===0 && sphereCorrectCount===totalCorrect;
    setIsPerfect(perfect);

    setScore(s=>s+pts);setStats(ns);setHighlights(hl);
    addLog(`결과 ${checkedCorrect}개 정답·권역 ${sphereCorrectCount}개 정답·오답 ${checkedWrong}개 → +${pts}점`,turn);
    if(perfect) addLog(`💚 퍼펙트! 회복 카드 획득!`,turn);

    const dead=Object.entries(ns).find(([,v])=>v===0);
    if(dead){setResult('lost');setTimeout(()=>setScreen('ended'),2200);return;}
    if(turn>=MAX_TURNS && !perfect){
      setResult('won');setTimeout(()=>setScreen('ended'),2200);return;
    }
  }

  function handleHeal(sphereKey){
    const ns={...stats};
    const oldVal=ns[sphereKey];
    ns[sphereKey]=clamp(ns[sphereKey]+HEAL_AMOUNT);
    setStats(ns);setHealedSphere(sphereKey);
    addLog(`💚 회복 카드 사용: ${STAT_META[sphereKey].icon}${STAT_META[sphereKey].label} +${HEAL_AMOUNT}% (${oldVal}%→${ns[sphereKey]}%)`,turn);
    setScore(s=>s+5);
  }

  function handleHealSkip(){
    addLog(`회복 카드 건너뜀`,turn);
    goNextTurn();
  }

  function handleHealDone(){
    goNextTurn();
  }

  function goNextTurn(){
    if(turn>=MAX_TURNS){
      setResult('won');setTimeout(()=>setScreen('ended'),1200);
      return;
    }
    setTurn(t=>t+1);setHand(drawHand(3));
    setActiveCard(null);setPostPrimary(null);
    setCheckedIds(new Set());setSpherePicks({});setRevealed(false);setHighlights({});
    setIsPerfect(false);setHealPhase(false);setHealedSphere(null);
    setScreen('select');
  }

  function nextTurn(){
    if(isPerfect&&!healPhase){
      setHealPhase(true);
      return;
    }
    goNextTurn();
  }

  const displayStats=screen==='consequences'?(postPrimary||stats):stats;

  const getConfirmLabel=()=>{
    if(checkedIds.size===0) return `정답 ${totalCorrect}개를 찾아서 체크하세요`;
    if(!allCorrectChecked){
      if(checkedWrong>0) return `⚠️ 오답 포함 — 정답 ${checkedCorrect}/${totalCorrect}개 (오답 ${checkedWrong}개)`;
      return `정답을 더 찾아보세요 (${checkedCorrect}/${totalCorrect}개 선택됨)`;
    }
    if(!allSpheresPicked) return `권역 선택 중... (${[...checkedIds].filter(id=>spherePicks[id]).length}/${checkedIds.size} 완료)`;
    return `✅ 선택 완료 → 결과 확인하기`;
  };

  const TopNav=({showScore=false})=>(
    <header style={{borderBottom:'1px solid rgba(255,255,255,.07)',padding:'10px 20px',background:'rgba(6,11,20,.95)',position:'sticky',top:0,zIndex:10}}>
      <div className="max-w-7xl mx-auto flex justify-between items-center">
        <div className="flex items-center gap-3">
          <span className="text-xl">🌍</span>
          <div>
            <span className="ft text-lg shimmer-txt">어스 밸런스</span>
            <span className="ft text-xs ml-2 px-2 py-0.5 rounded-full hidden sm:inline-block"
              style={{color:'#7dd3fc',background:'rgba(56,189,248,.08)',border:'1px solid rgba(56,189,248,.2)'}}>
              중2 과학 · 지구계
            </span>
          </div>
        </div>
        <div className="flex items-center gap-3">
          {showScore&&<>
            <div className="text-center">
              <div className="ft text-xl text-sky-400">{turn}<span className="text-base" style={{color:'rgba(255,255,255,.25)'}}>/{MAX_TURNS}</span></div>
              <div className="text-xs" style={{color:'rgba(255,255,255,.3)'}}>TURN</div>
            </div>
            <div className="text-center">
              <div className="ft text-xl" style={{color:'#fbbf24'}}>{score}</div>
              <div className="text-xs" style={{color:'rgba(255,255,255,.3)'}}>점수</div>
            </div>
            <button onClick={startGame}
              className="p-2 rounded-xl transition-all"
              style={{border:'1px solid rgba(255,255,255,.1)',color:'rgba(255,255,255,.3)'}}
              onMouseEnter={e=>{e.currentTarget.style.color='white';e.currentTarget.style.borderColor='rgba(255,255,255,.3)';}}
              onMouseLeave={e=>{e.currentTarget.style.color='rgba(255,255,255,.3)';e.currentTarget.style.borderColor='rgba(255,255,255,.1)';}}>
              <IcoRefresh s={15}/>
            </button>
          </>}
          <button onClick={()=>setShowInfo(true)}
            className="p-2 rounded-xl transition-all"
            style={{border:'1px solid rgba(56,189,248,.3)',color:'#7dd3fc'}}
            title="웹앱 정보">
            <IcoInfo s={16}/>
          </button>
        </div>
      </div>
      {showScore&&(
        <div className="max-w-7xl mx-auto mt-2">
          <div className="h-1 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,.05)'}}>
            <div className="h-full rounded-full transition-all duration-500"
              style={{width:`${(turn/MAX_TURNS)*100}%`,background:'linear-gradient(90deg,#0ea5e9,#10b981)'}}/>
          </div>
        </div>
      )}
    </header>
  );

  /* ── INTRO ── */
  if(screen==='intro') return(
    <div className="min-h-screen flex flex-col" style={{background:'radial-gradient(ellipse at 50% 0%,#0a1628 0%,#060b14 55%)'}}>
      <TopNav/>
      <div className="flex-1 flex flex-col items-center justify-center p-6">
        <div className="max-w-xl w-full text-center">
          <div className="text-8xl mb-4 float-anim">🌍</div>
          <h1 className="ft text-4xl shimmer-txt mb-1">어스 밸런스</h1>
          <p className="text-base mb-1" style={{color:'rgba(255,255,255,.35)',letterSpacing:'0.1em'}}>EARTH SYSTEM SIMULATOR</p>
          <p className="text-sm mb-7 ft px-3 py-1.5 rounded-full inline-block"
            style={{color:'#7dd3fc',background:'rgba(56,189,248,.08)',border:'1px solid rgba(56,189,248,.2)'}}>
            중2 과학 · 지구계 — 여러 요소로 이루어진 지구계
          </p>
          <div className="rounded-2xl p-5 mb-6 text-left space-y-3"
            style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)'}}>
            <p className="text-lg leading-relaxed" style={{color:'rgba(255,255,255,.8)'}}>
              지구를 이루는 <span className="ft" style={{color:'#38bdf8'}}>5가지 권역</span>이 서로 어떻게 영향을 주고받는지 체험하는 시뮬레이션입니다.
            </p>
            <div className="space-y-2">
              {[
                ['①','rgba(255,255,255,.05)','transparent','자연현상 카드를 선택합니다'],
                ['②','rgba(120,53,15,.3)','rgba(245,158,11,.25)','일어날 결과 3가지를 모두 찾아 체크합니다'],
                ['③','rgba(88,28,135,.3)','rgba(167,139,250,.25)','체크한 항목마다 영향받는 권역을 선택합니다'],
                ['④','rgba(255,255,255,.05)','transparent','정답 확인 + 과학적 원리 학습!'],
              ].map(([num,bg,bc,txt])=>(
                <div key={num} className="flex items-center gap-3 rounded-xl px-4 py-2.5"
                  style={{background:bg,border:`1px solid ${bc}`}}>
                  <span className="text-xl">{num}</span>
                  <span className="text-base" style={{color:'rgba(255,255,255,.8)'}}>{txt}</span>
                </div>
              ))}
            </div>
            <div className="rounded-xl px-4 py-2.5 flex items-center gap-3"
              style={{background:'rgba(52,211,153,.1)',border:'1px solid rgba(52,211,153,.25)'}}>
              <span className="text-xl">💚</span>
              <span className="text-base" style={{color:'rgba(255,255,255,.8)'}}>
                모두 맞히면 <span className="ft" style={{color:'#34d399'}}>회복 카드</span>로 권역을 +{HEAL_AMOUNT}% 회복!
              </span>
            </div>
            <p className="text-sm" style={{color:'rgba(255,255,255,.4)'}}>
              단 하나의 권역이라도 <span className="ft" style={{color:'#f87171'}}>0%</span>가 되면 게임 오버.&nbsp;
              <span className="ft" style={{color:'#4ade80'}}>{MAX_TURNS}턴</span> 동안 살아남으세요!
            </p>
          </div>
          <button onClick={startGame} className="w-full py-4 ft text-xl rounded-2xl text-white"
            style={{background:'linear-gradient(135deg,#0ea5e9,#06b6d4,#10b981)',boxShadow:'0 0 35px rgba(14,165,233,.4)'}}>
            시뮬레이션 시작 →
          </button>
        </div>
      </div>
      <Footer/>
      {showInfo&&<InfoModal onClose={()=>setShowInfo(false)}/>}
    </div>
  );

  /* ── ENDED ── */
  if(screen==='ended') return(
    <div className="min-h-screen flex flex-col" style={{background:result==='won'?'radial-gradient(ellipse at 50% 0%,#0a2010,#060b14 55%)':'radial-gradient(ellipse at 50% 0%,#200a0a,#060b14 55%)'}}>
      <TopNav/>
      <div className="flex-1 flex flex-col items-center justify-center p-6">
        <div className="max-w-md w-full text-center">
          <div className="text-8xl mb-4 pop-in">{result==='won'?'🌟':'💥'}</div>
          <h2 className={`ft text-4xl mb-2 ${result==='won'?'text-green-400':'text-red-400'}`}>
            {result==='won'?'생태계 수호 성공!':'시스템 붕괴'}
          </h2>
          <p className="text-lg mb-7" style={{color:'rgba(255,255,255,.5)'}}>{turn-1}턴 생존 · 총점 {score}점</p>
          <div className="rounded-2xl p-5 mb-5" style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)'}}>
            {SPHERES.map(k=>(
              <div key={k} className="flex items-center gap-3 mb-3">
                <span className="text-lg">{STAT_META[k].icon}</span>
                <span className="ft text-base w-16" style={{color:'rgba(255,255,255,.6)'}}>{STAT_META[k].label}</span>
                <div className="flex-1 h-3 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,.1)'}}>
                  <div className="h-full rounded-full" style={{width:`${stats[k]}%`,background:STAT_META[k].color}}/>
                </div>
                <span className="ft text-base w-10 text-right" style={{color:'rgba(255,255,255,.6)'}}>{stats[k]}%</span>
              </div>
            ))}
          </div>
          <div className="flex gap-3 mb-3">
            <button onClick={()=>setShowReport(true)}
              className="flex-1 py-3.5 ft text-base rounded-xl flex items-center justify-center gap-2 transition-colors"
              style={{border:'1px solid rgba(56,189,248,.4)',color:'#7dd3fc'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(8,47,73,.4)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <IcoChart s={18}/> 결과 리포트
            </button>
            <button onClick={startGame} className="flex-1 py-3.5 ft text-base rounded-xl text-white"
              style={{background:'linear-gradient(135deg,#0ea5e9,#10b981)'}}>
              다시 도전
            </button>
          </div>
        </div>
      </div>
      <Footer/>
      {showReport&&<ReportModal stats={stats} logs={logs} score={score} turn={turn} onClose={()=>setShowReport(false)}/>}
      {showInfo&&<InfoModal onClose={()=>setShowInfo(false)}/>}
    </div>
  );

  /* ── PLAYING ── */
  return(
    <div className="min-h-screen flex flex-col" style={{background:'radial-gradient(ellipse at 50% -5%,#071828 0%,#060b14 50%)'}}>
      <TopNav showScore={true}/>

      <div className="flex-1 max-w-7xl mx-auto w-full p-4 flex gap-4">
        {/* LEFT */}
        <div className="flex-shrink-0 flex flex-col gap-3" style={{width:265}}>
          <div className="flex justify-center py-1"><Globe stats={displayStats}/></div>
          <div className="ft text-xs text-center" style={{color:'rgba(255,255,255,.3)',letterSpacing:'0.1em'}}>지구 권역 상태</div>
          {SPHERES.map(k=>(
            <StatBar key={k} statKey={k} value={displayStats[k]} prevValue={prevStats[k]}
              highlight={revealed?highlights[k]:null}
              healHighlight={healedSphere===k}/>
          ))}
          <div ref={logsRef} className="rounded-xl p-3 overflow-y-auto mt-1"
            style={{border:'1px solid rgba(255,255,255,.07)',background:'rgba(0,0,0,.3)',height:88}}>
            {logs.length===0&&<p className="text-sm text-center" style={{color:'rgba(255,255,255,.2)',marginTop:8}}>이벤트 기록</p>}
            {logs.map((l,i)=>(
              <div key={i} className="text-sm mb-1 leading-snug"
                style={{color:l.includes('선택:')?'#fcd34d':l.includes('퍼펙트')||l.includes('회복')?'#34d399':l.includes('정답')?'#7dd3fc':'rgba(255,255,255,.3)'}}>
                {l}
              </div>
            ))}
          </div>
        </div>

        {/* RIGHT */}
        <div className="flex-1 flex flex-col gap-4 min-w-0">

          {/* PHASE 1: SELECT */}
          {screen==='select'&&(
            <>
              <div>
                <h2 className="ft text-2xl text-white">자연현상을 선택하세요</h2>
                <p className="text-base mt-1" style={{color:'rgba(255,255,255,.45)'}}>카드를 선택하면 결과를 직접 예측합니다 — 정답 <b>3개</b>를 모두 찾아보세요!</p>
              </div>
              <div className="flex flex-col gap-4 flex-1">
                {hand.map((card,i)=>(
                  <button key={i} onClick={()=>pickCard(card)}
                    className="card-btn rounded-2xl p-5 text-left w-full"
                    style={{border:'2px solid rgba(255,255,255,.12)',background:'rgba(255,255,255,.05)'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(56,189,248,.6)';e.currentTarget.style.background='rgba(8,47,73,.15)';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,.12)';e.currentTarget.style.background='rgba(255,255,255,.05)';}}>
                    <div className="flex items-center gap-4">
                      <span className="text-5xl flex-shrink-0">{card.emoji}</span>
                      <div className="flex-1 min-w-0">
                        <h3 className="ft text-xl text-white mb-0.5">{card.name}</h3>
                        <p className="text-base mb-3 leading-snug" style={{color:'rgba(255,255,255,.5)'}}>{card.desc}</p>
                        <div className="flex items-center gap-2 rounded-xl px-3 py-2"
                          style={{background:'rgba(0,0,0,.3)',border:'1px solid rgba(255,255,255,.08)'}}>
                          <span className="ft text-sm flex-shrink-0" style={{color:'rgba(255,255,255,.4)'}}>1차 효과:</span>
                          <span className="text-base flex-1" style={{color:'rgba(255,255,255,.7)'}}>{card.primary.text}</span>
                          <span className={`ml-2 ft text-base flex-shrink-0 ${card.primary.delta>0?'text-green-400':'text-red-400'}`}>
                            {STAT_META[card.primary.key].icon}{card.primary.delta>0?`+${card.primary.delta}`:card.primary.delta}
                          </span>
                        </div>
                      </div>
                      <IcoChevron s={22} c="flex-shrink-0" style={{color:'rgba(255,255,255,.25)'}}/>
                    </div>
                  </button>
                ))}
              </div>
            </>
          )}

          {/* PHASE 2: CONSEQUENCES */}
          {screen==='consequences'&&activeCard&&(
            <div className="flex flex-col gap-4 flex-1 slide-up">
              <div className="rounded-2xl p-4 flex-shrink-0"
                style={{border:'2px solid rgba(245,158,11,.4)',background:'rgba(120,53,15,.2)'}}>
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-3xl">{activeCard.emoji}</span>
                  <div>
                    <h2 className="ft text-xl" style={{color:'#fcd34d'}}>{activeCard.name}</h2>
                    <p className="text-base" style={{color:'rgba(255,255,255,.55)'}}>{activeCard.desc}</p>
                  </div>
                </div>
                <div className="flex items-center gap-3 rounded-xl px-3 py-2"
                  style={{background:'rgba(0,0,0,.25)',border:'1px solid rgba(245,158,11,.2)'}}>
                  <span className="ft text-sm flex-shrink-0" style={{color:'rgba(245,158,11,.7)'}}>✅ 1차 효과:</span>
                  <span className="text-base flex-1" style={{color:'rgba(255,255,255,.8)'}}>{activeCard.primary.text}</span>
                  <span className={`ft text-base flex-shrink-0 ${activeCard.primary.delta>0?'text-green-400':'text-red-400'}`}>
                    {STAT_META[activeCard.primary.key].icon}{activeCard.primary.delta>0?`+${activeCard.primary.delta}`:activeCard.primary.delta}
                  </span>
                </div>
              </div>

              {!revealed?(
                <div className="flex gap-3 flex-shrink-0">
                  <div className="flex-1 rounded-xl px-3 py-2 flex items-center gap-2"
                    style={{background:'rgba(8,47,73,.3)',border:'1px solid rgba(56,189,248,.3)'}}>
                    <span className="ft text-sm" style={{color:'#7dd3fc'}}>STEP 1</span>
                    <span className="text-sm" style={{color:'rgba(255,255,255,.7)'}}>
                      일어날 결과 <b style={{color:'#fbbf24'}}>{totalCorrect}가지를 모두</b> 찾아 체크하세요
                    </span>
                  </div>
                  <div className="flex-1 rounded-xl px-3 py-2 flex items-center gap-2"
                    style={{background:'rgba(88,28,135,.3)',border:'1px solid rgba(167,139,250,.3)'}}>
                    <span className="ft text-sm" style={{color:'#c4b5fd'}}>STEP 2</span>
                    <span className="text-sm" style={{color:'rgba(255,255,255,.7)'}}>체크한 항목마다 영향받는 권역을 선택하세요</span>
                  </div>
                </div>
              ):(
                <div className="flex items-center gap-2 flex-shrink-0">
                  <IcoInfo s={18} c="text-green-400 flex-shrink-0"/>
                  <p className="ft text-lg text-green-300">결과 확인 — 과학적 원리를 읽어보세요!</p>
                  {isPerfect&&!healPhase&&(
                    <span className="ft text-sm px-2 py-1 rounded-lg ml-2 sparkle"
                      style={{background:'rgba(52,211,153,.2)',border:'1px solid rgba(52,211,153,.4)',color:'#34d399'}}>
                      💚 퍼펙트! 회복 카드 획득!
                    </span>
                  )}
                </div>
              )}

              {!revealed&&checkedIds.size>0&&(
                <div className="flex-shrink-0 flex items-center gap-3"
                  style={{background:'rgba(255,255,255,.04)',borderRadius:12,padding:'8px 14px',border:'1px solid rgba(255,255,255,.08)'}}>
                  <span className="text-sm ft" style={{color:'rgba(255,255,255,.5)'}}>정답 찾기:</span>
                  <div className="flex gap-1.5">
                    {Array.from({length:totalCorrect}).map((_,i)=>(
                      <div key={i} className="w-4 h-4 rounded-full transition-all duration-300"
                        style={{background:i<checkedCorrect?'#22c55e':'rgba(255,255,255,.15)',
                          border:i<checkedCorrect?'none':'1px solid rgba(255,255,255,.2)'}}/>
                    ))}
                  </div>
                  <span className="text-sm ft" style={{color:checkedCorrect===totalCorrect?'#4ade80':'rgba(255,255,255,.5)'}}>
                    {checkedCorrect}/{totalCorrect}
                  </span>
                  {checkedWrong>0&&<span className="text-sm ft text-red-400">오답 {checkedWrong}개 포함</span>}
                </div>
              )}

              {/* ★ 회복 카드 UI */}
              {healPhase&&(
                <HealCardPanel stats={stats} onHeal={handleHeal} onSkip={handleHealSkip} onDone={handleHealDone}/>
              )}

              {/* Consequence rows — hide when in heal phase */}
              {!healPhase&&(
                <div className="flex flex-col gap-2.5 overflow-y-auto pr-1" style={{flex:1,maxHeight:'calc(100vh - 420px)'}}>
                  {activeCard.consequences.map(c=>(
                    <ConseqRow key={c.id} item={c}
                      checked={checkedIds.has(c.id)} pickedSphere={spherePicks[c.id]||null}
                      revealed={revealed} onToggle={toggleCheck} onPickSphere={pickSphere}/>
                  ))}
                </div>
              )}

              {/* CTA */}
              <div className="flex-shrink-0">
                {!revealed?(
                  <button onClick={confirm} disabled={!canConfirm}
                    className={`w-full py-4 ft text-lg rounded-2xl text-white transition-all ${canConfirm?'cursor-pointer':'cursor-not-allowed opacity-50'}`}
                    style={canConfirm?{background:'linear-gradient(135deg,#0ea5e9,#10b981)',boxShadow:'0 0 25px rgba(14,165,233,.3)'}:{background:'#1e293b'}}>
                    {getConfirmLabel()}
                  </button>
                ):healPhase?(
                  null
                ):(
                  <button onClick={nextTurn} className="w-full py-4 ft text-lg rounded-2xl text-white"
                    style={{background:isPerfect
                      ?'linear-gradient(135deg,#059669,#0d9488,#0ea5e9)'
                      :'linear-gradient(135deg,#7c3aed,#0ea5e9)',
                      boxShadow:isPerfect?'0 0 25px rgba(52,211,153,.4)':'0 0 25px rgba(124,58,237,.3)'}}>
                    {isPerfect
                      ?'💚 회복 카드 사용하기 →'
                      :`다음 턴으로 → (${Math.min(turn+1,MAX_TURNS)}/${MAX_TURNS}턴)`}
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      </div>

      <Footer/>
      {showReport&&<ReportModal stats={stats} logs={logs} score={score} turn={turn} onClose={()=>setShowReport(false)}/>}
      {showInfo&&<InfoModal onClose={()=>setShowInfo(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
