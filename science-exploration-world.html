<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 탐험 월드 · Science Exploration World</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Do+Hyeon&display=swap" rel="stylesheet">
<style>
:root{
  --px:4px;
  --font-ko:"Galmuri11","Do Hyeon",sans-serif;
  --font-ko-bold:"Galmuri14","Do Hyeon",sans-serif;
  --font-en:"Press Start 2P",monospace;
  --font-read:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
  --sky-top:#79c4ff;--sky-bottom:#bfe9ff;
  --ground:#5fa83d;--ground-dark:#3a6f25;
  --soil:#6b4a2b;--soil-dark:#4a3119;
  --card-face:#c9a06a;--card-top:#dcb985;--card-side:#9c7541;--card-edge:#6b4a2b;
  --ink:#2a1c10;--ink-soft:#5a4226;
  --accent:#ffcf3f;--accent-deep:#e09b1c;
  --bar:#7a5836;--bar-edge:#4a3119;
  --ambient:rgba(0,0,0,0);--star-op:0;
}
body[data-time="night"]{--sky-top:#0c1233;--sky-bottom:#243a6b;--ground:#2f6b3c;--ground-dark:#1b3f23;--ambient:rgba(6,10,30,.45);--star-op:1;}
body[data-theme="cave"]{--sky-top:#2a2622;--sky-bottom:#100d0b;--ground:#4b4640;--ground-dark:#2c2925;--soil:#3a352f;--soil-dark:#231f1b;--card-face:#6a635a;--card-top:#807868;--card-side:#4a443c;--card-edge:#1c1916;--ink:#f3e9d2;--ink-soft:#bdb29a;--accent:#ff9b3d;--accent-deep:#c25e12;--bar:#2c2925;--bar-edge:#15120f;--ambient:rgba(0,0,0,.35);}
body[data-theme="cave"][data-time="night"]{--sky-top:#16120f;--sky-bottom:#070504;--ambient:rgba(0,0,0,.6);}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-ko);color:var(--ink);background:linear-gradient(180deg,var(--sky-top),var(--sky-bottom));min-height:100vh;overflow-x:hidden;position:relative;transition:background .8s ease,color .8s ease;image-rendering:pixelated;}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:var(--ambient);transition:background .8s ease;}

.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.celestial{position:absolute;top:96px;right:12%;width:72px;height:72px;transition:opacity .8s ease,transform .8s ease;}
.sun{background:#ffe14d;box-shadow:0 0 0 8px rgba(255,225,77,.35),-16px 0 0 #ffd21f,16px 0 0 #ffd21f,0 -16px 0 #ffd21f,0 16px 0 #ffd21f;}
.moon{background:#e7ecff;box-shadow:-16px 8px 0 #c2cbe8,8px -8px 0 #fff;opacity:0;}
body[data-time="night"] .sun{opacity:0;transform:scale(.6);}
body[data-time="night"] .moon{opacity:1;}
body[data-theme="cave"] .celestial{opacity:0!important;}
.stars{position:absolute;inset:0;opacity:var(--star-op);transition:opacity .8s ease;}
.star{position:absolute;width:3px;height:3px;background:#fff;animation:twinkle 3s infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:.2;}50%{opacity:1;}}
.cloud{position:absolute;background:#fff;box-shadow:0 14px 0 #fff,28px 14px 0 #fff,-28px 14px 0 #fff,14px 28px 0 #eef6ff;opacity:.9;transition:opacity .8s ease;}
.cloud.c1{top:120px;left:-120px;width:56px;height:18px;animation:drift 60s linear infinite;}
.cloud.c2{top:200px;left:-160px;width:42px;height:14px;animation:drift 85s linear infinite;animation-delay:-20s;}
.cloud.c3{top:90px;left:-200px;width:64px;height:20px;animation:drift 100s linear infinite;animation-delay:-50s;}
@keyframes drift{from{transform:translateX(0);}to{transform:translateX(120vw);}}
body[data-time="night"] .cloud,body[data-theme="cave"] .cloud{opacity:0;}
.ores{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;}
body[data-theme="cave"] .ores{opacity:1;}
.ore{position:absolute;width:14px;height:14px;background:#5a544c;box-shadow:inset 3px 3px 0 #6f685e,inset -3px -3px 0 #3a352f;}
.ore::after{content:"";position:absolute;inset:4px;}
.ore.gold::after{background:#ffcf3f;box-shadow:0 0 8px #ffcf3f;}
.ore.diamond::after{background:#5ff0e0;box-shadow:0 0 8px #5ff0e0;}
.ore.redstone::after{background:#ff3b3b;box-shadow:0 0 8px #ff3b3b;}

.topbar{position:sticky;top:0;z-index:40;background:var(--bar);box-shadow:inset 0 4px 0 rgba(255,255,255,.14),inset 0 -5px 0 var(--bar-edge),0 4px 0 rgba(0,0,0,.3);transition:background .6s ease;}
.bar-inner{display:flex;align-items:center;gap:12px;max-width:1180px;margin:0 auto;padding:10px 14px;}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:#fff;flex:0 0 auto;font-family:var(--font-ko-bold);font-size:16px;text-shadow:2px 2px 0 rgba(0,0,0,.4);}
.brand .blk{width:20px;height:20px;background:var(--accent);box-shadow:inset -3px -3px 0 var(--accent-deep);}
.toolnav{flex:1 1 auto;display:flex;gap:8px;overflow-x:auto;padding:4px 2px;scrollbar-width:thin;}
.toolnav::-webkit-scrollbar{height:6px;}
.toolnav::-webkit-scrollbar-thumb{background:rgba(0,0,0,.3);}
.navbtn{flex:0 0 auto;font-family:var(--font-ko-bold);font-size:13px;color:#fff;cursor:pointer;text-decoration:none;background:var(--card-side);padding:8px 12px;line-height:1;white-space:nowrap;box-shadow:inset 2px 2px 0 rgba(255,255,255,.25),inset -3px -3px 0 rgba(0,0,0,.35);transition:transform .1s ease,background .15s ease,color .15s ease;display:inline-flex;align-items:center;gap:6px;}
.navbtn .n{font-family:var(--font-en);font-size:9px;opacity:.9;}
.navbtn:hover{transform:translateY(-2px);}
.navbtn.active{background:var(--accent);color:var(--ink);}
.navbtn.active .n{opacity:1;}
.controls{flex:0 0 auto;display:flex;gap:8px;}
.blockbtn{font-family:var(--font-ko-bold);font-size:13px;color:#fff;cursor:pointer;padding:9px 11px;background:var(--card-side);border:none;line-height:1;box-shadow:inset 2px 2px 0 rgba(255,255,255,.3),inset -3px -3px 0 rgba(0,0,0,.4);transition:transform .08s ease;display:flex;align-items:center;gap:6px;}
.blockbtn:hover{transform:translateY(-2px);}
.blockbtn:active{transform:translateY(1px);}

.hero{position:relative;z-index:10;text-align:center;padding:54px 20px 24px;}
.crumb{display:inline-block;font-family:var(--font-en);font-size:9px;letter-spacing:1px;color:#fff;background:var(--accent-deep);padding:7px 12px;margin-bottom:22px;box-shadow:inset 2px 2px 0 rgba(255,255,255,.35),inset -2px -2px 0 rgba(0,0,0,.35),3px 3px 0 rgba(0,0,0,.3);}
.title{font-family:var(--font-ko-bold);font-size:clamp(38px,8vw,82px);color:#fff;line-height:1.1;letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:.32em;flex-wrap:wrap;cursor:pointer;user-select:none;text-shadow:0 var(--px) 0 #2f7d1c,0 calc(var(--px)*2) 0 #2f7d1c,0 calc(var(--px)*3) 0 #245e15,0 calc(var(--px)*4) 0 #1c4a10,calc(var(--px)*1.5) calc(var(--px)*5.5) 0 rgba(0,0,0,.35);}
body[data-theme="cave"] .title{text-shadow:0 var(--px) 0 #7a5a2c,0 calc(var(--px)*2) 0 #7a5a2c,0 calc(var(--px)*3) 0 #5c4220,0 calc(var(--px)*4) 0 #3f2c15,calc(var(--px)*1.5) calc(var(--px)*5.5) 0 rgba(0,0,0,.5);}
.title .ti{height:.82em;width:auto;flex:0 0 auto;filter:drop-shadow(0 4px 0 rgba(0,0,0,.3));}
.subtitle{margin-top:26px;font-family:var(--font-en);font-size:11px;color:rgba(255,255,255,.9);letter-spacing:2px;text-shadow:2px 2px 0 rgba(0,0,0,.4);}
.tagline{margin-top:16px;font-family:var(--font-read);font-size:16px;color:rgba(255,255,255,.95);text-shadow:1px 1px 0 rgba(0,0,0,.35);display:inline-flex;align-items:center;gap:.45em;}
.tagline .ti{height:1.3em;width:auto;flex:0 0 auto;}

.searchwrap{margin:26px auto 0;max-width:440px;display:flex;align-items:center;gap:10px;background:var(--card-face);padding:10px 12px;box-shadow:inset 3px 3px 0 rgba(255,255,255,.2),inset -4px -4px 0 var(--card-side),4px 4px 0 var(--card-edge);}
.searchwrap .mag{font-size:16px;}
.searchwrap input{flex:1;border:none;background:transparent;outline:none;font-family:var(--font-read);font-size:15px;color:var(--ink);}
.searchwrap input::placeholder{color:var(--ink-soft);opacity:.8;}
.searchwrap .clr{cursor:pointer;font-family:var(--font-ko-bold);font-size:13px;color:var(--ink-soft);background:none;border:none;display:none;}
.countline{margin-top:14px;font-family:var(--font-read);font-size:13px;color:rgba(255,255,255,.92);text-shadow:1px 1px 0 rgba(0,0,0,.3);}
.countline b{color:var(--accent);}

.progresswrap{max-width:440px;margin:16px auto 0;background:var(--card-face);padding:12px 14px;box-shadow:inset 3px 3px 0 rgba(255,255,255,.2),inset -4px -4px 0 var(--card-side),4px 4px 0 var(--card-edge);}
.progresswrap .ptop{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-ko-bold);font-size:13px;color:var(--ink);}
.preset{cursor:pointer;background:none;border:none;font-family:var(--font-read);font-size:11px;color:var(--ink-soft);text-decoration:underline;}
.pbar{margin-top:9px;height:18px;background:var(--soil-dark);box-shadow:inset 2px 2px 0 rgba(0,0,0,.35);position:relative;overflow:hidden;}
.pfill{height:100%;width:0;background:repeating-linear-gradient(90deg,#5fd17a 0 10px,#4cc068 10px 12px);box-shadow:inset 0 3px 0 rgba(255,255,255,.35);transition:width .5s ease;}
.pfill.done{background:repeating-linear-gradient(90deg,#5ff0e0 0 10px,#3fd6c6 10px 12px);}
.ptext{margin-top:8px;font-family:var(--font-read);font-size:12px;color:var(--ink-soft);}

.herorow{margin:22px auto 0;max-width:620px;display:flex;gap:14px;justify-content:center;align-items:stretch;flex-wrap:wrap;}
.feature{flex:1 1 320px;min-width:260px;text-align:left;cursor:pointer;background:var(--card-face);padding:14px 16px;color:var(--ink);text-decoration:none;display:block;box-shadow:inset 3px 3px 0 rgba(255,255,255,.2),inset -5px -5px 0 var(--card-side),5px 5px 0 var(--card-edge);transition:transform .12s ease;}
.feature:hover{transform:translateY(-4px);}
.feature .flabel{font-family:var(--font-en);font-size:8px;letter-spacing:1px;color:var(--accent-deep);}
.feature .ft{font-family:var(--font-ko-bold);font-size:17px;margin-top:8px;display:flex;align-items:center;gap:8px;}
.feature .ft .fi{width:30px;height:30px;flex:0 0 auto;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:inset 2px 2px 0 rgba(255,255,255,.45),inset -2px -2px 0 var(--accent-deep);}
.feature .fq{margin-top:8px;font-family:var(--font-read);font-size:13px;color:var(--ink-soft);line-height:1.5;}
.tnt{flex:0 0 auto;cursor:pointer;border:none;color:#fff;font-family:var(--font-ko-bold);font-size:15px;padding:0 22px;background:repeating-linear-gradient(0deg,#c0392b 0 9px,#9e2a1f 9px 11px);box-shadow:inset 3px 3px 0 rgba(255,255,255,.25),inset -4px -4px 0 rgba(0,0,0,.4),5px 5px 0 rgba(0,0,0,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-width:120px;text-shadow:1px 1px 0 rgba(0,0,0,.5);transition:transform .1s ease;}
.tnt:hover{transform:translateY(-3px);}
.tnt:active{transform:translateY(2px);}
.tnt .tlabel{font-family:var(--font-en);font-size:9px;background:#000;color:#ffcf3f;padding:3px 5px;letter-spacing:1px;}

main{position:relative;z-index:10;max-width:1080px;margin:0 auto;padding:6px 20px 40px;}
#appRoot{scroll-margin-top:70px;}
.subnav{display:flex;gap:8px;overflow-x:auto;padding:8px 0 16px;scrollbar-width:thin;}
.subnav::-webkit-scrollbar{height:6px;}
.subnav::-webkit-scrollbar-thumb{background:rgba(0,0,0,.25);}
.section{scroll-margin-top:70px;margin:6px 0 8px;}
.unit-head{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-ko-bold);font-size:21px;color:var(--ink);background:var(--card-top);padding:9px 16px;margin-bottom:16px;box-shadow:inset 3px 3px 0 rgba(255,255,255,.4),inset -3px -3px 0 rgba(0,0,0,.25),4px 4px 0 rgba(0,0,0,.25);}
.unit-head .blk{width:18px;height:18px;background:var(--accent);box-shadow:inset -3px -3px 0 var(--accent-deep);}
.unit-head .cnt{font-family:var(--font-en);font-size:9px;color:#fff;background:var(--accent-deep);padding:4px 7px;box-shadow:inset 1px 1px 0 rgba(255,255,255,.3);}
.grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));}

.card{position:relative;display:block;text-decoration:none;color:var(--ink);background:var(--card-face);padding:18px 18px 16px;border-top:6px solid var(--card-top);overflow:hidden;box-shadow:inset 4px 4px 0 rgba(255,255,255,.18),inset -5px -5px 0 var(--card-side),6px 6px 0 var(--card-edge);transition:transform .12s ease,box-shadow .12s ease;opacity:0;transform:translateY(16px);animation:rise .5s forwards;}
@keyframes rise{to{opacity:1;transform:translateY(0);}}
.card[href]:hover{transform:translateY(-6px);box-shadow:inset 4px 4px 0 rgba(255,255,255,.25),inset -5px -5px 0 var(--card-side),6px 12px 0 var(--card-edge);}
.card .icon{width:40px;height:40px;margin-bottom:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:inset 3px 3px 0 rgba(255,255,255,.45),inset -3px -3px 0 var(--accent-deep);transition:box-shadow .2s ease;}
.card h3{font-family:var(--font-ko-bold);font-size:17px;line-height:1.35;margin-bottom:10px;}
.card .quiz{font-family:var(--font-read);font-size:13.5px;color:var(--ink-soft);line-height:1.55;min-height:42px;}
.card .go{margin-top:14px;font-family:var(--font-en);font-size:8px;letter-spacing:1px;color:var(--accent-deep);}
.card.todo{opacity:.72;cursor:default;}
.card.todo .icon{background:var(--card-side);box-shadow:inset 3px 3px 0 rgba(255,255,255,.25),inset -3px -3px 0 var(--card-edge);}
.card.todo .go{color:var(--ink-soft);}
.card.mined .icon{box-shadow:inset 3px 3px 0 rgba(255,255,255,.5),inset -3px -3px 0 var(--accent-deep),0 0 14px var(--accent);}
.card.mined .go{color:#37a253;}
body[data-theme="cave"] .card.mined .go{color:#5ff0e0;}
.minedmark{position:absolute;top:8px;right:8px;font-family:var(--font-en);font-size:8px;color:#fff;background:#37a253;padding:4px 6px;box-shadow:inset 1px 1px 0 rgba(255,255,255,.4);}
.newbadge{position:absolute;top:8px;right:8px;font-family:var(--font-en);font-size:8px;color:#fff;background:#e63946;padding:4px 6px;box-shadow:inset 1px 1px 0 rgba(255,255,255,.4);animation:newblink 1.2s steps(2) infinite;}
@keyframes newblink{50%{opacity:.55;}}

.empty{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:22px;background:var(--card-face);opacity:.7;box-shadow:inset 4px 4px 0 rgba(255,255,255,.15),inset -5px -5px 0 var(--card-side),6px 6px 0 var(--card-edge);}
.empty .ic{width:38px;height:38px;flex:0 0 auto;background:var(--card-side);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:inset 3px 3px 0 rgba(255,255,255,.2),inset -3px -3px 0 var(--card-edge);}
.empty p{font-family:var(--font-read);font-size:14px;color:var(--ink-soft);line-height:1.5;}
.noresult{display:none;text-align:center;padding:50px 20px;font-family:var(--font-read);font-size:16px;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.3);}

.mascot{position:fixed;left:16px;bottom:16px;z-index:46;display:flex;align-items:flex-end;gap:10px;max-width:330px;}
.mascot .guy{width:62px;height:62px;flex:0 0 auto;cursor:pointer;animation:bob 2.6s ease-in-out infinite;filter:drop-shadow(3px 3px 0 rgba(0,0,0,.35));}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.bubble{position:relative;background:#fff;color:#2a1c10;font-family:var(--font-read);font-size:13px;line-height:1.5;padding:11px 13px;box-shadow:inset 2px 2px 0 rgba(255,255,255,.6),inset -3px -3px 0 #cdbfa6,4px 4px 0 rgba(0,0,0,.3);max-width:240px;cursor:pointer;}
.bubble b{color:#c25e12;}
.bubble::after{content:"";position:absolute;left:-8px;bottom:14px;width:8px;height:8px;background:#fff;}
.mascot .close{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border:none;cursor:pointer;background:#9e2a1f;color:#fff;font-family:var(--font-ko-bold);font-size:11px;box-shadow:inset 1px 1px 0 rgba(255,255,255,.3);}

.particle{position:fixed;width:9px;height:9px;z-index:60;pointer-events:none;box-shadow:inset 2px 2px 0 rgba(255,255,255,.4),inset -2px -2px 0 rgba(0,0,0,.3);animation:burst .6s ease-out forwards;}
@keyframes burst{to{transform:translate(var(--dx),var(--dy)) rotate(40deg) scale(.3);opacity:0;}}
.raindrop{position:fixed;top:-20px;width:14px;height:14px;z-index:55;pointer-events:none;box-shadow:inset 2px 2px 0 rgba(255,255,255,.4),inset -3px -3px 0 rgba(0,0,0,.3);animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(108vh) rotate(180deg);opacity:.2;}}

.grassline{position:relative;z-index:10;height:26px;background:var(--ground);box-shadow:inset 0 8px 0 rgba(255,255,255,.12),inset 0 -6px 0 var(--ground-dark);}
footer{position:relative;z-index:10;background:var(--soil);border-top:8px solid var(--ground);text-align:center;padding:34px 20px 60px;box-shadow:inset 0 6px 0 var(--soil-dark);}
footer .maker{font-family:var(--font-ko-bold);font-size:18px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4);}
footer .role{margin-top:8px;font-family:var(--font-read);font-size:14px;color:#f0dcc0;}
footer .contact{margin-top:16px;font-family:var(--font-read);font-size:14px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
footer .contact a{color:#ffe6b8;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
footer .contact a:hover{color:#fff;text-decoration:underline;}
footer .copy{margin-top:18px;font-family:var(--font-en);font-size:8px;letter-spacing:1px;color:#d9c3a3;line-height:2;}

.toTop{position:fixed;right:18px;bottom:18px;z-index:45;width:50px;height:50px;cursor:pointer;border:none;background:var(--accent);color:var(--ink);font-size:22px;font-family:var(--font-ko-bold);box-shadow:inset 3px 3px 0 rgba(255,255,255,.5),inset -4px -4px 0 var(--accent-deep),4px 4px 0 rgba(0,0,0,.35);opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .25s ease,transform .25s ease;}
.toTop.show{opacity:1;pointer-events:auto;transform:translateY(0);}
.toTop:hover{transform:translateY(-3px);}

@media(max-width:640px){
  .brand span.t,.blockbtn span.t{display:none;}
  .hero{padding:42px 16px 20px;}
  .grid{grid-template-columns:1fr 1fr;gap:12px;}
  .card{padding:13px;}.card h3{font-size:14px;}.card .quiz{font-size:12px;min-height:36px;}
  .mascot{display:none;}
  .tnt{width:100%;flex-basis:100%;padding:14px;}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}
</style>
</head>
<body data-time="day" data-theme="wild">

<div class="sky">
  <div class="stars" id="stars"></div>
  <div class="celestial sun"></div><div class="celestial moon"></div>
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
  <div class="ores" id="ores"></div>
</div>

<div class="topbar">
  <div class="bar-inner">
    <a class="brand" href="#top"><span class="blk"></span><span class="t">과학 탐험 월드</span></a>
    <nav class="toolnav" id="catNav" aria-label="갈래 선택"></nav>
    <div class="controls">
      <button class="blockbtn" id="soundBtn" aria-label="효과음 켜기"><span class="ic" id="soundIc">🔇</span></button>
      <button class="blockbtn" id="timeBtn" aria-label="낮과 밤 전환"><span class="ic" id="timeIc">☀️</span><span class="t" id="timeTx">낮</span></button>
      <button class="blockbtn" id="themeBtn" aria-label="야생과 동굴 테마 전환"><span class="ic" id="themeIc">🌳</span><span class="t" id="themeTx">야생</span></button>
    </div>
  </div>
</div>

<section class="hero" id="top">
  <span class="crumb">EXPLORE · LEARN · PLAY</span>

<script>
/* =========================================================
   ✏️ 데이터
   CATS  : 상단 3갈래
   UNITS : 중2과학 단원 (biome = 단원 선택 시 배경)
   MYSTERY / GAMES : 추리·게임 갈래의 앱
   앱 객체: {icon,title,q(호기심질문),url,nw(NEW배지)}
   url 비우면 '준비 중' 잠금 / 배열 비우면 '준비 중' 갈래
   ========================================================= */
const CATS=[
  {id:'mid2',    label:'중2과학',          icon:'🧪'},
  {id:'mystery', label:'추리로 배우는 과학', icon:'🔎', biome:{t:'night',th:'wild'}},
  {id:'game',    label:'게임으로 배우는 과학',icon:'🎮', biome:{t:'day',th:'wild'}},
];

const UNITS=[
  { no:1, unit:"물질의 특성", biome:{t:'day',th:'wild'}, apps:[
    {icon:"⚖️", title:"밀도 실험실", q:"쇠구슬은 가라앉는데 거대한 배는 왜 뜰까?", url:"https://scienceisjo.github.io/propertiesofmatter/"},
    {icon:"🧂", title:"용해도 실험실", q:"뜨거운 물에 설탕이 더 잘 녹는 이유는?", url:"https://scienceisjo.github.io/propertiesofmatter/solubility"},
    {icon:"🌡️", title:"녹는점과 끓는점", q:"물질마다 정해진 '변신 온도'가 있다고?", url:"https://scienceisjo.github.io/propertiesofmatter/bpmp"},
  ]},
  { no:2, unit:"지권의 변화", biome:{t:'day',th:'cave'}, apps:[
    {icon:"🏜️", title:"퇴적암의 여행", q:"강이 옮긴 모래가 어떻게 단단한 돌이 될까?", url:"https://scienceisjo.github.io/sedimentaryrock-adventure/"},
    {icon:"🌍", title:"지권의 층상구조", q:"발밑을 계속 파고들면 무엇이 나올까?", url:"https://scienceisjo.github.io/-layered-structure-of-the-earth/"},
    {icon:"🌐", title:"어스밸런스", q:"공기·물·땅·생물은 서로 어떻게 영향을 줄까?", url:"https://scienceisjo.github.io/scienceworld/earthbalance", nw:true},
    {icon:"🌋", title:"화성암의 여행", q:"뜨거운 마그마가 식으면 어떤 돌이 될까?", url:"https://scienceisjo.github.io/scienceworld/igneousrocks", nw:true},
    {icon:"🍞", title:"변성암 베이커리", q:"열과 압력을 받은 돌은 어떻게 변신할까?", url:"https://scienceisjo.github.io/metamorphic-rock/"},
    {icon:"🧭", title:"암석 분류 알고리즘", q:"수많은 암석을 무슨 기준으로 나눌까?", url:"https://scienceisjo.github.io/rock-classification/"},
    {icon:"💎", title:"광물 실험실", q:"겉모습이 비슷한 광물을 어떻게 구별할까?", url:"https://scienceisjo.github.io/minerallab/", nw:true},
  ]},
  { no:3, unit:"빛과 파동", biome:{t:'day',th:'wild'}, apps:[] },
  { no:4, unit:"물질의 구성", biome:{t:'night',th:'wild'}, apps:[
    {icon:"🗺️", title:"마법의 원소 지도", q:"세상 모든 물질은 몇 가지 재료로 이뤄졌을까?", url:"https://scienceisjo.github.io/periodictable/"},
    {icon:"💧", title:"물의 전기분해로 알아보는 원소와 화합물", q:"물에 전기를 흘리면 무엇으로 나뉠까?", url:"https://scienceisjo.github.io/element_compound/"},
    {icon:"⚛️", title:"원자 제작소", q:"원자 하나는 무엇으로 만들어졌을까?", url:"https://scienceisjo.github.io/atomicnumber/"},
    {icon:"🧪", title:"주기율표 분류 탐구", q:"원소를 줄 세우면 어떤 규칙이 보일까?", url:""},
    {icon:"🍽️", title:"입자 레스토랑", q:"원자·분자·이온은 무엇이 다를까?", url:"https://scienceisjo.github.io/particlerestaurant/"},
    {icon:"🔋", title:"이온의 이동 확인하기 (시뮬레이션)", q:"전기를 걸면 이온은 어디로 움직일까?", url:"https://scienceisjo.github.io/ionicmovement/"},
    {icon:"🧫", title:"이온의 이동 확인하기 (실험)", q:"보이지 않는 이온의 이동을 어떻게 눈으로 볼까?", url:"https://scienceisjo.github.io/ioncharge/"},
    {icon:"⭐", title:"이온을 별의 커비로 이해하기", q:"원자가 전자를 잃거나 얻으면 무엇이 될까?", url:"https://scienceisjo.github.io/ionicmovement/ionkerby", nw:true},
  ]},
  { no:5, unit:"식물과 에너지", biome:{t:'day',th:'wild'}, apps:[] },
  { no:6, unit:"동물과 에너지", biome:{t:'day',th:'wild'}, apps:[] },
  { no:7, unit:"전기와 자기", biome:{t:'night',th:'wild'}, apps:[] },
  { no:8, unit:"별과 우주", biome:{t:'night',th:'wild'}, apps:[] },
];

const MYSTERY=[
  {icon:"🏛️", title:"CSI 수사대 — 로마의 사라진 보석을 찾아라", q:"사건 현장의 단서로 범인을 어떻게 찾을까?", url:"https://scienceisjo.github.io/portfolio/csi-rome", nw:true},
  {icon:"🕵️", title:"물질 추리 탐정", q:"물질의 성질만으로 정체를 밝힐 수 있을까?", url:"https://scienceisjo.github.io/propertiesofmatter/mattersnoop.html", nw:true},
];

const GAMES=[]; // 🎮 게임 링크는 여기에 추가하세요

/* ---------- 진행도 저장 ---------- */
function loadMined(){try{return new Set(JSON.parse(localStorage.getItem('sew-mined')||'[]'));}catch(e){return new Set();}}
function saveMined(s){try{localStorage.setItem('sew-mined',JSON.stringify([...s]));}catch(e){}}
let mined=loadMined();
const openUrls=[], ALL=[];

/* ---------- 카드 만들기 ---------- */
let totalApps=0, openApps=0;
function makeCard(a){
  const ready=a.url&&a.url.trim()!=="";
  totalApps++; if(ready){openApps++;openUrls.push(a.url);} ALL.push(a);
  const card=document.createElement(ready?'a':'div');
  card.className='card'+(ready?'':' todo');
  if(ready){card.href=a.url;card.target='_blank';card.rel='noopener';card.dataset.url=a.url;}
  else card.setAttribute('aria-disabled','true');
  card.dataset.search=(a.title+' '+(a.q||'')).toLowerCase();
  const isMined=ready&&mined.has(a.url);
  if(isMined)card.classList.add('mined');
  const corner=a.nw?'<span class="newbadge">NEW</span>':(isMined?'<span class="minedmark">⛏ 채굴</span>':'');
  const go=!ready?'준비 중 ◷':(isMined?'채굴 완료 ✓':'OPEN ▸');
  card.innerHTML=corner+'<div class="icon">'+a.icon+'</div><h3>'+a.title+'</h3><p class="quiz">🤔 '+(a.q||'')+'</p><div class="go">'+go+'</div>';
  if(ready)card.addEventListener('click',ev=>{markMined(a.url);burst(ev.clientX,ev.clientY);breakSound();});
  return card;
}
function makeGrid(apps,emptyMsg){
  const grid=document.createElement('div');grid.className='grid';
  if(!apps.length){const e=document.createElement('div');e.className='empty';e.innerHTML='<div class="ic">⛏️</div><p>'+emptyMsg+'</p>';grid.appendChild(e);}
  else apps.forEach((a,i)=>{const c=makeCard(a);c.style.animationDelay=(i*0.05)+'s';grid.appendChild(c);});
  return grid;
}

/* ---------- 렌더링 ---------- */
const catNav=document.getElementById('catNav');
const subnav=document.getElementById('subnav');
const root=document.getElementById('appRoot');

CATS.forEach(c=>{
  const b=document.createElement('a');b.className='navbtn';b.href='#';b.dataset.cat=c.id;
  b.innerHTML='<span class="n">'+c.icon+'</span>'+c.label;catNav.appendChild(b);
});

UNITS.forEach(u=>{
  const ub=document.createElement('a');ub.className='navbtn';ub.href='#unit-'+u.no;ub.dataset.no=u.no;
  ub.innerHTML='<span class="n">'+String(u.no).padStart(2,'0')+'</span>'+u.unit;subnav.appendChild(ub);

  const sec=document.createElement('section');sec.className='section';sec.id='unit-'+u.no;sec.dataset.cat='mid2';sec.dataset.unit=u.no;
  const head=document.createElement('div');head.className='unit-head';
  head.innerHTML='<span class="blk"></span>('+u.no+') '+u.unit+'<span class="cnt">'+(u.apps.length?u.apps.length+'개':'준비 중')+'</span>';
  sec.appendChild(head);
  sec.appendChild(makeGrid(u.apps,'이 단원의 실험실은 지금 열심히 만들고 있어요. 곧 새로운 블록이 추가됩니다!'));
  root.appendChild(sec);
});

function makeCatSection(cat,apps,emptyMsg){
  const sec=document.createElement('section');sec.className='section';sec.id='cat-'+cat.id;sec.dataset.cat=cat.id;
  const head=document.createElement('div');head.className='unit-head';
  head.innerHTML='<span class="blk"></span>'+cat.icon+' '+cat.label+'<span class="cnt">'+(apps.length?apps.length+'개':'준비 중')+'</span>';
  sec.appendChild(head);
  sec.appendChild(makeGrid(apps,emptyMsg));
  root.appendChild(sec);
}
makeCatSection(CATS[1],MYSTERY,'추리 콘텐츠를 준비하고 있어요!');
makeCatSection(CATS[2],GAMES,'게임 콘텐츠를 준비하고 있어요. 곧 만나요! 🎮');

document.getElementById('countLine').innerHTML='지금 <b>'+openApps+'개</b>의 실험실 · 중2과학·추리·게임 3개 갈래로 탐험해요 ⛏️';

/* ---------- 진행도 ---------- */
const pfill=document.getElementById('pfill'),ptext=document.getElementById('ptext');
function minedCount(){let c=0;openUrls.forEach(u=>{if(mined.has(u))c++;});return c;}
function updateProgress(){
  const c=minedCount(),t=openUrls.length,pct=t?Math.round(c/t*100):0;
  pfill.style.width=pct+'%';
  if(c>=t&&t>0){pfill.classList.add('done');ptext.innerHTML='🏆 모든 블록을 채굴했어요! <b>탐험가</b> 칭호 획득 💎';}
  else{pfill.classList.remove('done');ptext.textContent=c+' / '+t+' 블록 채굴 완료';}
}
function markMined(url){if(mined.has(url))return;mined.add(url);saveMined(mined);
  document.querySelectorAll('.card[data-url="'+CSS.escape(url)+'"]').forEach(c=>{c.classList.add('mined');const g=c.querySelector('.go');if(g)g.textContent='채굴 완료 ✓';});
  updateProgress();buildFeature();
}
document.getElementById('resetBtn').addEventListener('click',()=>{
  mined=new Set();saveMined(mined);
  document.querySelectorAll('.card.mined').forEach(c=>{c.classList.remove('mined');const g=c.querySelector('.go');if(g)g.textContent='OPEN ▸';});
  updateProgress();
});
updateProgress();

/* ---------- 오늘의 실험실 ---------- */
const featureEl=document.getElementById('feature');
function findApp(url){return ALL.find(a=>a.url===url);}
let todayUrl=openUrls.length?openUrls[Math.floor(Math.random()*openUrls.length)]:null;
function buildFeature(){
  if(!todayUrl){featureEl.style.display='none';return;}
  const a=findApp(todayUrl);if(!a){featureEl.style.display='none';return;}
  featureEl.href=todayUrl;featureEl.target='_blank';featureEl.rel='noopener';
  featureEl.innerHTML='<span class="flabel">★ 오늘의 실험실</span><div class="ft"><span class="fi">'+a.icon+'</span>'+a.title+'</div><p class="fq">🤔 '+(a.q||'')+'</p>';
}
featureEl.addEventListener('click',ev=>{if(todayUrl){markMined(todayUrl);burst(ev.clientX,ev.clientY);breakSound();}});
buildFeature();

/* ---------- 랜덤 탐험 ---------- */
document.getElementById('tntBtn').addEventListener('click',ev=>{
  if(!openUrls.length)return;
  const url=openUrls[Math.floor(Math.random()*openUrls.length)];const x=ev.clientX,y=ev.clientY;
  for(let i=0;i<3;i++)setTimeout(()=>burst(x,y),i*80);
  breakSound();markMined(url);
  setTimeout(()=>window.open(url,'_blank','noopener'),180);
});

/* ---------- 별/광석 ---------- */
const starBox=document.getElementById('stars');
for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*70+'%';s.style.animationDelay=(Math.random()*3)+'s';starBox.appendChild(s);}
const oreBox=document.getElementById('ores');const ot=['gold','diamond','redstone','',''];
for(let i=0;i<26;i++){const o=document.createElement('div');const t=ot[Math.floor(Math.random()*ot.length)];o.className='ore'+(t?(' '+t):'');o.style.left=Math.random()*100+'%';o.style.top=Math.random()*100+'%';oreBox.appendChild(o);}

/* ---------- 2단계 네비 + 검색 + 바이옴 ---------- */
const search=document.getElementById('search'),clearBtn=document.getElementById('clearBtn'),noResult=document.getElementById('noResult');
const catBtns=[...catNav.querySelectorAll('.navbtn')];
const unitBtns=[...subnav.querySelectorAll('.navbtn')];
const sections=[...root.querySelectorAll('.section')];
const body=document.body;
let activeCat='mid2', activeUnit=UNITS[0].no;

function applyView(){
  const q=search.value.trim().toLowerCase();
  clearBtn.style.display=q?'block':'none';
  if(q){
    subnav.style.display='none';
    let any=false;
    sections.forEach(sec=>{let vis=0;
      sec.querySelectorAll('.card').forEach(c=>{const m=(c.dataset.search||'').includes(q);c.style.display=m?'':'none';if(m)vis++;});
      const e=sec.querySelector('.empty');if(e)e.style.display='none';
      sec.style.display=vis>0?'':'none';if(vis>0)any=true;});
    catBtns.forEach(b=>b.classList.remove('active'));
    unitBtns.forEach(b=>b.classList.remove('active'));
    noResult.style.display=any?'none':'block';
  }else{
    subnav.style.display=(activeCat==='mid2')?'':'none';
    sections.forEach(sec=>{
      sec.querySelectorAll('.card').forEach(c=>c.style.display='');
      const e=sec.querySelector('.empty');if(e)e.style.display='';
      let show=(sec.dataset.cat===activeCat);
      if(show&&activeCat==='mid2')show=(sec.dataset.unit===String(activeUnit));
      sec.style.display=show?'':'none';});
    catBtns.forEach(b=>b.classList.toggle('active',b.dataset.cat===activeCat));
    unitBtns.forEach(b=>b.classList.toggle('active',+b.dataset.no===activeUnit));
    noResult.style.display='none';
  }
}
function applyBiome(){
  let b;
  if(activeCat==='mid2'){const u=UNITS.find(x=>x.no===activeUnit);b=u&&u.biome;}
  else{const c=CATS.find(x=>x.id===activeCat);b=c&&c.biome;}
  if(b){body.dataset.time=b.t;body.dataset.theme=b.th;paint();}
}
function selectUnit(no,scroll){
  activeUnit=no;activeCat='mid2';if(search.value)search.value='';
  applyView();applyBiome();
  if(scroll){const sec=document.getElementById('unit-'+no);if(sec)sec.scrollIntoView({behavior:'smooth',block:'start'});}
}
function selectCat(id,scroll){
  activeCat=id;if(search.value)search.value='';
  applyView();applyBiome();
  if(scroll){const tgt=(id==='mid2')?document.getElementById('appRoot'):document.getElementById('cat-'+id);if(tgt)tgt.scrollIntoView({behavior:'smooth',block:'start'});}
}
catBtns.forEach(b=>b.addEventListener('click',e=>{e.preventDefault();selectCat(b.dataset.cat,true);}));
unitBtns.forEach(b=>b.addEventListener('click',e=>{e.preventDefault();selectUnit(+b.dataset.no,true);}));
search.addEventListener('input',applyView);
clearBtn.addEventListener('click',()=>{search.value='';applyView();search.focus();});

/* ---------- 맨 위로 ---------- */
const toTop=document.getElementById('toTop');
window.addEventListener('scroll',()=>{toTop.classList.toggle('show',window.scrollY>420);});
toTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

/* ---------- 토글 ---------- */
const timeBtn=document.getElementById('timeBtn'),themeBtn=document.getElementById('themeBtn');
function paint(){
  document.getElementById('timeIc').textContent=body.dataset.time==='night'?'🌙':'☀️';
  document.getElementById('timeTx').textContent=body.dataset.time==='night'?'밤':'낮';
  document.getElementById('themeIc').textContent=body.dataset.theme==='cave'?'⛏️':'🌳';
  document.getElementById('themeTx').textContent=body.dataset.theme==='cave'?'동굴':'야생';
}
timeBtn.addEventListener('click',()=>{body.dataset.time=body.dataset.time==='night'?'day':'night';paint();});
themeBtn.addEventListener('click',()=>{body.dataset.theme=body.dataset.theme==='cave'?'wild':'cave';paint();});

/* ---------- 효과음 ---------- */
let actx=null,soundOn=false;
const soundBtn=document.getElementById('soundBtn'),soundIc=document.getElementById('soundIc');
function ensureCtx(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function blip(freq,dur){if(!soundOn||!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=freq;o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);o.start();o.stop(actx.currentTime+dur);}
function breakSound(){blip(240,.06);setTimeout(()=>blip(150,.09),55);}
soundBtn.addEventListener('click',()=>{ensureCtx();soundOn=!soundOn;soundIc.textContent=soundOn?'🔊':'🔇';soundBtn.setAttribute('aria-label',soundOn?'효과음 끄기':'효과음 켜기');if(soundOn)breakSound();});

/* ---------- 블록 파편 / 블록 비 ---------- */
const pcolors=['#ffcf3f','#5fd17a','#5ff0e0','#ff6f59','#a78bfa','#7ec8ff'];
function burst(x,y){for(let i=0;i<9;i++){const p=document.createElement('div');p.className='particle';p.style.left=x+'px';p.style.top=y+'px';p.style.background=pcolors[i%pcolors.length];const ang=Math.random()*Math.PI*2,dist=30+Math.random()*55;p.style.setProperty('--dx',Math.cos(ang)*dist+'px');p.style.setProperty('--dy',(Math.sin(ang)*dist+40)+'px');document.body.appendChild(p);setTimeout(()=>p.remove(),620);}}
document.getElementById('title').addEventListener('click',()=>{breakSound();for(let i=0;i<26;i++){const d=document.createElement('div');d.className='raindrop';d.style.left=Math.random()*100+'vw';d.style.background=pcolors[i%pcolors.length];d.style.animationDuration=(1+Math.random()*1.1)+'s';d.style.animationDelay=(Math.random()*.4)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),2600);}});

/* ---------- 마스코트 ---------- */
const FACTS=[
  "알고 있나요? <b>다이아몬드</b>도 사실 탄소로 이뤄져 있어요.",
  "물 한 방울 속에는 원자가 <b>수천억 개</b>나 들어 있대요!",
  "소금이 물에 녹으면 <b>이온</b>으로 흩어져요.",
  "지구 한가운데(내핵)는 <b>철</b> 덩어리예요.",
  "빛은 1초에 지구를 <b>일곱 바퀴 반</b> 돈답니다.",
  "같은 부피라도 무게가 다른 건 <b>밀도</b> 때문이에요.",
  "마그마가 천천히 식으면 알갱이가 <b>큰</b> 암석이 돼요.",
  "별빛은 <b>아주 먼 과거</b>의 빛을 보는 거예요."
];
const bubble=document.getElementById('bubble');
let fi=Math.floor(Math.random()*FACTS.length);
function showFact(){bubble.innerHTML=FACTS[fi];fi=(fi+1)%FACTS.length;}
showFact();let factTimer=setInterval(showFact,7000);
function nextFact(){clearInterval(factTimer);showFact();factTimer=setInterval(showFact,7000);}
bubble.addEventListener('click',nextFact);
document.getElementById('mascotGuy').addEventListener('click',()=>{nextFact();const r=document.getElementById('mascotGuy').getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2);breakSound();});
document.getElementById('mascotClose').addEventListener('click',()=>{document.getElementById('mascot').style.display='none';clearInterval(factTimer);});

/* ---------- 시작 ---------- */
paint();
selectCat('mid2',false);
</script>
